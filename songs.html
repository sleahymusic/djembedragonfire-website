<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Song List | Djembe Dragonfire</title>
  <meta name="description" content="Browse Djembe Dragonfire's searchable Second Life performance song list by song, artist, genre, mood, and theme." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Djembe Dragonfire</a>
    <nav aria-label="Main navigation">
      <a href="index.html#listen">Listen</a>
      <a href="index.html#about">About</a>
      <a href="index.html#shows">Shows</a>
      <a href="songs.html">Song List</a>
      <a href="index.html#contact">Booking</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Browse the music</p>
      <h1>Song List</h1>
      <p class="lead">Search the catalog by title, artist, genre, mood, or theme. Genre tabs are arranged to match the Master Song List / SL notecard style.</p>
    </section>

    <section class="section song-browser">
      <div class="browser-toolbar">
        <div>
          <label class="search-label" for="songSearch">Main search</label>
          <input id="songSearch" class="search-input" type="search" placeholder="Search title or artist..." />
        </div>
        <div>
          <label class="search-label" for="moodFilter">Mood / theme</label>
          <select id="moodFilter" class="search-input">
            <option value="">All moods and themes</option>
          </select>
        </div>
      </div>

      <div id="genreTabs" class="genre-tabs" aria-label="Song genres"></div>
      <div class="song-meta"><span id="songCount"></span></div>
      <div id="songResults" class="song-results" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Djembe Dragonfire. All rights reserved.</p>
  </footer>

  <script src="songs.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
